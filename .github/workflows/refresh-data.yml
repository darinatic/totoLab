name: refresh-data

# Singapore Toto draws happen Mon & Thu (~18:30 SGT). We fetch a few hours later
# (15:00 UTC = 23:00 SGT), regenerate the precomputed backtest, commit both, and
# let Render redeploy (which reseeds from the CSV and ships the fresh JSON).
on:
  schedule:
    - cron: "0 15 * * 1,4"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests pandas numpy scipy scikit-learn

      - name: Fetch latest draws into the seed CSV
        working-directory: backend
        run: python -m app.ingest --update-csv --pages 3

      - name: Regenerate the precomputed backtest
        working-directory: backend
        run: python -m app.precompute

      - name: Commit if anything changed
        run: |
          CSV=backend/data/seed_draws.csv
          JSON=frontend/public/precomputed/backtest.json
          if [[ -n "$(git status --porcelain $CSV $JSON)" ]]; then
            git config user.name "toto-data-bot"
            git config user.email "actions@users.noreply.github.com"
            git add "$CSV" "$JSON"
            git commit -m "Update Toto draw data and precomputed backtest"
            git push
          else
            echo "No new draws."
          fi
